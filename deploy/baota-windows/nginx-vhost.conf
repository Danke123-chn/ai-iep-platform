# Baota Windows: replace the site vhost for 49.232.129.88
# Panel -> Website -> 49.232.129.88 -> Config (配置文件)
#
# Before saving:
# 1. Create empty dir: C:\wwwroot\49.232.129.88-proxy  (or .proxy if you prefer)
# 2. Delete old files under:
#    C:\BtSoft\nginx\conf\vhost\proxy\49.232.129.88\
#    C:\BtSoft\nginx\conf\vhost\static_cache\49.232.129.88\
# 3. PM2 must run: C:\wwwroot\49.232.129.88\.next\standalone\server.js

server
{
    listen 80;
    server_name 49.232.129.88;

    # Empty directory only (do NOT point to the git repo)
    root C:/wwwroot/49.232.129.88-proxy;
    index index.html;

    # Do NOT use Baota static_cache / PHP / old proxy includes for Next.js

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / HMR not needed in prod, harmless to keep
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Avoid caching HTML/API through nginx (prevents stale login page)
        proxy_buffering off;
        add_header Cache-Control "no-store" always;
    }

    # Block hidden files if request hits nginx directly
    location ~ ^/(\.user\.ini|\.htaccess|\.git|\.svn|\.project|LICENSE|README\.md) {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    access_log  C:/BtSoft/wwwlogs/49.232.129.88.log;
    error_log   C:/BtSoft/wwwlogs/49.232.129.88.error.log;
}
