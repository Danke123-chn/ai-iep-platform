# Replace YOUR_DOMAIN with your domain or use server_name _ for IP-only access.
# Install: sudo cp deploy/tencent-cloud/nginx.conf /etc/nginx/sites-available/ai-iep-platform
#          sudo ln -sf /etc/nginx/sites-available/ai-iep-platform /etc/nginx/sites-enabled/
#          sudo rm -f /etc/nginx/sites-enabled/default
#          sudo nginx -t && sudo systemctl reload nginx

upstream ai_iep_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    client_max_body_size 20m;

    location / {
        proxy_pass http://ai_iep_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }
}
